# ============================================================
# SGPP - Docker Compose (Entorno Completo)
# ============================================================
# Levanta todo el sistema (DB + pgAdmin + Backend + Frontend
# Uso:
#   docker-compose up -d --build   (iniciar y construir)
#   docker-compose up -d          (iniciar en segundo plano)
#   docker-compose down         (detener)
#   docker-compose down -v      (detener y borrar volúmenes/datos)
# ============================================================

services:

  # ----- Base de Datos PostgreSQL -----
  db:
    image: postgres:15-alpine
    container_name: sgpp-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sgpp_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sgpp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----- pgAdmin (Interfaz gráfica para PostgreSQL) -----
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sgpp-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@sgpp.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ----- Backend (Spring Boot) -----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgpp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB: ${POSTGRES_DB:-sgpp_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

  # ----- Frontend (React + Vite + Nginx -----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sgpp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
    driver: local
  pgadmin_data:
    driver: local
