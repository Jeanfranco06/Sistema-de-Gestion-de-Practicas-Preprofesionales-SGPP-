# ============================================================
# SGPP - Docker Compose (Entorno de Desarrollo Completo)
# ============================================================

services:

  # ---- Base de Datos PostgreSQL ----
  db:
    image: postgres:15-alpine
    container_name: sgpp-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sgpp_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sgpp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- pgAdmin ----
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sgpp-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@sgpp.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ---- Backend (Spring Boot) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgpp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Puerto 8082 expuesto en el host para coincidir con la configuración del backend local
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-sgpp_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-SGPPSECRETKEY2024UNTIngenieriaIndustrialSistemaGestionPracticasPreprofesionalesBase64ValidKeyForJWTTokenGeneration}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
    volumes:
      - sgpp_uploads:/app/uploads

  # ---- Frontend (React / Vite para Desarrollo) ----
  frontend:
    image: node:20-alpine
    container_name: sgpp-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      # Puerto 5173 expuesto en el host para coincidir con la configuración de Vite
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
    driver: local
  pgadmin_data: 
    driver: local
  sgpp_uploads:
    driver: local
  frontend_node_modules:
    driver: local
