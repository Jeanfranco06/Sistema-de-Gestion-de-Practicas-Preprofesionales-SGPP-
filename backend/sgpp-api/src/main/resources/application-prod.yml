spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-init-sql: SET search_path TO sgpp, public
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: sgpp
  flyway:
    enabled: true
    # A new production schema must execute V1; baselining would skip it.
    baseline-on-migrate: false
    create-schemas: true
    schemas: sgpp
    default-schema: sgpp
    locations: classpath:db/migration
    validate-on-migrate: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
  show-actuator: false

app:
  storage:
    provider: supabase
    supabase:
      url: ${SUPABASE_URL}
      service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
      bucket: ${SUPABASE_STORAGE_BUCKET:sgpp-documentos}

sgpp:
  frontend:
    base-url: ${SGPP_FRONTEND_BASE_URL:}
  exportacion:
    directorio: /tmp/sgpp/exportaciones
  scheduler:
    plazos:
      enabled: ${SGPP_SCHEDULER_ENABLED:true}
  notificaciones:
    email:
      enabled: ${SGPP_EMAIL_ENABLED:false}

management:
  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    edu.unt.ingenieria_industrial.sgpp: INFO
