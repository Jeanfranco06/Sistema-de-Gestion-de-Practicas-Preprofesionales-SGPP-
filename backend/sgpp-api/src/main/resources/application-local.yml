spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/sgpp_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

server:
  port: ${SERVER_PORT:8082}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  storage:
    upload-dir: ${user.home}/sgpp/uploads

sgpp:
  exportacion:
    directorio: ${user.home}/sgpp/exportaciones
  scheduler:
    plazos:
      cron: "0 0 6 * * ?"
      enabled: true

logging:
  level:
    root: INFO
    edu.unt.ingenieria_industrial.sgpp: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
