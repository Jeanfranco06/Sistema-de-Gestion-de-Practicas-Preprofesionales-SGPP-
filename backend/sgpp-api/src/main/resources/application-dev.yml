spring:
  datasource:
    url: jdbc:postgresql://dev-db-server:5432/sgpp_db_dev
    username: sgpp_user
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

logging:
  level:
    root: INFO
    edu.unt.ingenieria_industrial.sgpp: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
